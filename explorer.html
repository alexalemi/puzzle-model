<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Speed Puzzling Model Explorer</title>
        <script src="https://d3js.org/d3.v7.min.js"></script>
        <style>
            @import url("https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,600;1,8..60,400&family=Source+Sans+3:wght@300;400;600&family=Source+Code+Pro:wght@400&display=swap");

            :root {
                --text: #303030;
                --text-light: #6e6e6e;
                --accent: #d4a04a;
                --bg: #fcfcfc;
                --bg-alt: #f6f4f0;
                --border: #e0ddd5;
                --blue: #4a7fb5;
                --red: #c44e52;
                --green: #55a868;
                --purple: #8172b2;
                --orange: #dd8452;
                --chart-bg: #fafaf7;
            }

            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                font-family: "Source Serif 4", Georgia, serif;
                color: var(--text);
                background: var(--bg);
                line-height: 1.7;
                -webkit-font-smoothing: antialiased;
            }

            .container {
                max-width: 900px;
                margin: 0 auto;
                padding: 0 24px;
            }

            header {
                border-bottom: 1px solid var(--border);
                padding: 48px 0 32px;
                margin-bottom: 40px;
            }
            header h1 {
                font-family: "Source Sans 3", sans-serif;
                font-weight: 600;
                font-size: 36px;
                letter-spacing: -0.5px;
                margin-bottom: 8px;
            }
            header .subtitle {
                font-size: 18px;
                color: var(--text-light);
                font-weight: 300;
            }
            header .meta {
                margin-top: 16px;
                font-family: "Source Sans 3", sans-serif;
                font-size: 13px;
                color: var(--text-light);
                display: flex;
                gap: 24px;
            }

            section {
                margin-bottom: 48px;
            }
            h2 {
                font-family: "Source Sans 3", sans-serif;
                font-weight: 600;
                font-size: 22px;
                margin-bottom: 16px;
                padding-bottom: 8px;
                border-bottom: 1px solid var(--border);
            }
            h3 {
                font-family: "Source Sans 3", sans-serif;
                font-weight: 600;
                font-size: 16px;
                margin-bottom: 8px;
            }
            p {
                margin-bottom: 16px;
                font-size: 16px;
            }

            .stat-grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
                gap: 12px;
                margin-bottom: 24px;
            }
            .stat-card {
                background: var(--bg-alt);
                border: 1px solid var(--border);
                border-radius: 4px;
                padding: 16px;
                text-align: center;
            }
            .stat-card .value {
                font-family: "Source Sans 3", sans-serif;
                font-weight: 600;
                font-size: 28px;
                color: var(--blue);
                display: block;
            }
            .stat-card .label {
                font-family: "Source Sans 3", sans-serif;
                font-size: 12px;
                color: var(--text-light);
                text-transform: uppercase;
                letter-spacing: 0.5px;
            }

            .chart-container {
                background: var(--chart-bg);
                border: 1px solid var(--border);
                border-radius: 4px;
                padding: 20px;
                margin-bottom: 16px;
                overflow-x: auto;
            }
            .chart-row {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 16px;
                margin-bottom: 16px;
            }
            @media (max-width: 700px) {
                .chart-row {
                    grid-template-columns: 1fr;
                }
            }

            svg text {
                font-family: "Source Sans 3", sans-serif;
                fill: var(--text);
            }
            .axis text {
                font-size: 11px;
                fill: var(--text-light);
            }
            .axis line,
            .axis path {
                stroke: var(--border);
            }
            .chart-title {
                font-size: 13px;
                font-weight: 600;
                fill: var(--text);
            }

            table {
                width: 100%;
                border-collapse: collapse;
                font-family: "Source Sans 3", sans-serif;
                font-size: 14px;
                margin-bottom: 16px;
            }
            th {
                background: var(--bg-alt);
                font-weight: 600;
                text-align: left;
                padding: 8px 12px;
                border-bottom: 2px solid var(--border);
                font-size: 12px;
                text-transform: uppercase;
                letter-spacing: 0.3px;
                color: var(--text-light);
            }
            td {
                padding: 6px 12px;
                border-bottom: 1px solid var(--border);
            }
            tr:hover td {
                background: var(--bg-alt);
            }
            .num {
                font-family: "Source Code Pro", monospace;
                text-align: right;
            }
            .puzzle-thumb {
                width: 48px;
                height: 48px;
                object-fit: contain;
                border-radius: 4px;
                transition:
                    transform 0.2s ease,
                    box-shadow 0.2s ease;
                cursor: pointer;
                position: relative;
                z-index: 1;
            }
            .puzzle-thumb:hover {
                transform: scale(5);
                z-index: 100;
                box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            }
            .bar-cell {
                position: relative;
                padding-right: 60px;
            }
            .bar-bg {
                position: absolute;
                left: 0;
                top: 2px;
                bottom: 2px;
                border-radius: 2px;
                opacity: 0.15;
            }

            details {
                margin-bottom: 16px;
                border: 1px solid var(--border);
                border-radius: 4px;
                background: var(--bg);
            }
            details[open] {
                background: var(--chart-bg);
            }
            summary {
                font-family: "Source Sans 3", sans-serif;
                font-weight: 600;
                font-size: 15px;
                padding: 12px 16px;
                cursor: pointer;
                user-select: none;
                list-style: none;
                display: flex;
                align-items: center;
                gap: 8px;
            }
            summary::-webkit-details-marker {
                display: none;
            }
            summary::before {
                content: "";
                display: inline-block;
                width: 0;
                height: 0;
                border-left: 5px solid var(--text-light);
                border-top: 4px solid transparent;
                border-bottom: 4px solid transparent;
                transition: transform 0.15s;
                flex-shrink: 0;
            }
            details[open] > summary::before {
                transform: rotate(90deg);
            }
            .details-content {
                padding: 0 16px 16px;
            }

            .model-selector {
                display: flex;
                gap: 8px;
                margin-bottom: 16px;
                flex-wrap: wrap;
            }
            .model-btn {
                font-family: "Source Sans 3", sans-serif;
                font-size: 13px;
                padding: 6px 16px;
                border: 1px solid var(--border);
                border-radius: 3px;
                background: var(--bg);
                cursor: pointer;
                transition: all 0.15s;
                color: var(--text);
            }
            .model-btn:hover {
                border-color: var(--blue);
                color: var(--blue);
            }
            .model-btn.active {
                background: var(--blue);
                color: white;
                border-color: var(--blue);
            }

            .metric-highlight {
                display: inline-block;
                background: var(--bg-alt);
                border: 1px solid var(--border);
                border-radius: 3px;
                padding: 2px 8px;
                font-family: "Source Code Pro", monospace;
                font-size: 13px;
            }

            .tooltip {
                position: absolute;
                pointer-events: none;
                background: white;
                border: 1px solid var(--border);
                border-radius: 3px;
                padding: 8px 12px;
                font-family: "Source Sans 3", sans-serif;
                font-size: 12px;
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
                z-index: 100;
                max-width: 240px;
            }
            .tooltip .tt-label {
                color: var(--text-light);
            }
            .tooltip .tt-value {
                font-weight: 600;
            }

            .search-box {
                font-family: "Source Sans 3", sans-serif;
                font-size: 14px;
                padding: 8px 12px;
                border: 1px solid var(--border);
                border-radius: 3px;
                width: 100%;
                max-width: 320px;
                margin-bottom: 12px;
                background: var(--bg);
                color: var(--text);
            }
            .search-box:focus {
                outline: none;
                border-color: var(--blue);
            }

            .footnote {
                font-size: 13px;
                color: var(--text-light);
                font-style: italic;
                margin-top: 4px;
            }

            .equation {
                font-family: "Source Code Pro", monospace;
                font-size: 14px;
                background: var(--bg-alt);
                padding: 12px 16px;
                border-radius: 4px;
                margin: 12px 0;
                overflow-x: auto;
                border-left: 3px solid var(--accent);
            }

            .pred-controls {
                display: grid;
                grid-template-columns: 1fr 1fr 1fr;
                gap: 16px;
                margin-bottom: 20px;
            }
            @media (max-width: 700px) {
                .pred-controls { grid-template-columns: 1fr; }
            }
            .pred-controls label {
                font-family: "Source Sans 3", sans-serif;
                font-size: 13px;
                font-weight: 600;
                color: var(--text-light);
                text-transform: uppercase;
                letter-spacing: 0.3px;
                display: block;
                margin-bottom: 4px;
            }
            .pred-controls input[type="text"],
            .pred-controls input[type="number"] {
                font-family: "Source Sans 3", sans-serif;
                font-size: 14px;
                padding: 8px 12px;
                border: 1px solid var(--border);
                border-radius: 3px;
                width: 100%;
                background: var(--bg);
                color: var(--text);
            }
            .pred-controls input:focus {
                outline: none;
                border-color: var(--blue);
            }
            .pred-year-display {
                font-family: "Source Code Pro", monospace;
                font-size: 14px;
                color: var(--blue);
                font-weight: 600;
                margin-left: 8px;
            }
            .pred-results {
                display: grid;
                grid-template-columns: 280px 1fr;
                gap: 20px;
                margin-bottom: 16px;
            }
            @media (max-width: 700px) {
                .pred-results { grid-template-columns: 1fr; }
            }
            .pred-summary .pred-card {
                background: var(--bg-alt);
                border: 1px solid var(--border);
                border-radius: 4px;
                padding: 12px 16px;
                margin-bottom: 8px;
            }
            .pred-card .pred-label {
                font-family: "Source Sans 3", sans-serif;
                font-size: 11px;
                color: var(--text-light);
                text-transform: uppercase;
                letter-spacing: 0.3px;
            }
            .pred-card .pred-value {
                font-family: "Source Code Pro", monospace;
                font-size: 22px;
                font-weight: 600;
                color: var(--blue);
            }
            .pred-card .pred-sub {
                font-family: "Source Sans 3", sans-serif;
                font-size: 12px;
                color: var(--text-light);
            }
            .pred-decomp {
                margin-top: 12px;
            }
            .pred-decomp td:first-child {
                font-family: "Source Sans 3", sans-serif;
                font-weight: 600;
                font-size: 13px;
            }
            .pred-piece-count {
                width: 80px;
                display: inline-block;
                margin-left: 8px;
            }

            .loading {
                text-align: center;
                padding: 60px 0;
                font-family: "Source Sans 3", sans-serif;
                color: var(--text-light);
                font-size: 16px;
            }

            footer {
                border-top: 1px solid var(--border);
                padding: 24px 0;
                margin-top: 48px;
                font-family: "Source Sans 3", sans-serif;
                font-size: 13px;
                color: var(--text-light);
            }
        </style>
    </head>
    <body>
        <div class="container">
            <header>
                <h1>Speed Puzzling Model Explorer</h1>
                <p class="subtitle">
                    A Bayesian latent factor model for predicting jigsaw puzzle
                    competition times
                </p>
                <div class="meta">
                    <span id="meta-records"></span>
                    <span id="meta-puzzlers"></span>
                    <span id="meta-puzzles"></span>
                </div>
            </header>

            <div id="app">
                <div class="loading">Loading data...</div>
            </div>
        </div>

        <div class="tooltip" id="tooltip" style="display: none"></div>

        <script>
            fetch("explorer_data.json")
                .then((r) => r.json())
                .then((DATA) => {
                    document.getElementById("app").innerHTML = `
<!-- Data Overview -->
<section>
  <h2>Data Overview</h2>
  <div class="stat-grid" id="stat-grid"></div>
  <div class="chart-row">
    <div class="chart-container"><div id="chart-scatter"></div></div>
    <div class="chart-container"><div id="chart-piece-dist"></div></div>
  </div>
  <details>
    <summary>Time distributions by piece count (mB)</summary>
    <div class="details-content">
      <p class="footnote">Completion times in milliBels (1000·log₁₀) are approximately normal within each piece count, supporting the log-normal likelihood assumption.</p>
      <div id="chart-histograms" class="chart-row" style="grid-template-columns: repeat(3, 1fr);"></div>
    </div>
  </details>
  <details>
    <summary>Puzzler observation frequency</summary>
    <div class="details-content">
      <p class="footnote">Most puzzlers have very few observations. Bayesian shrinkage pulls their estimates toward the population mean, avoiding overfitting.</p>
      <div class="chart-container"><div id="chart-puzzler-freq"></div></div>
    </div>
  </details>


</section>

<!-- Model -->
<section>
  <h2>Model Specification</h2>
  <p>Each model decomposes log-completion-time additively:</p>
  <div class="equation">mB(t<sub>ij</sub>) = &mu; + &alpha;<sub>i</sub> + &beta;<sub>j</sub> + 1000&middot;log<sub>10</sub>(&Sigma;<sub>k</sub> w<sub>k</sub> g<sub>k</sub>(N)) + &delta;<sub>i</sub>&middot;t + &epsilon;</div>
  <details>
    <summary>Model hierarchy details</summary>
    <div class="details-content">
      <table>
        <tr><th>Model</th><th>Formula</th><th>Parameters</th><th>Description</th></tr>
        <tr><th>Model</th><th>Formula</th><th>Parameters</th><th>Description</th><th>Data</th></tr>
        <tr><td>Model 1t</td><td class="num">&mu; + &alpha;<sub>i</sub> + &beta;<sub>j</sub> + c&middot;log(N)</td><td class="num" id="m1t-params"></td><td>Student-t robust baseline</td><td>First-attempt</td></tr>
        <tr><td>Model 2c</td><td class="num">+ log<sub>10</sub>(&Sigma;<sub>k</sub> w<sub>k</sub> g<sub>k</sub>(N)) + &delta;<sub>0</sub>t + &delta;<sub>i</sub>t</td><td class="num" id="m2c-params"></td><td>Physical basis + velocity (production)</td><td>First-attempt</td></tr>
        <tr><td>Model 2r</td><td class="num">+ &gamma;&middot;log(solve_number)</td><td class="num" id="m2r-params"></td><td>Practice effect (repeat solves)</td><td>All data</td></tr>
      </table>
      <p class="footnote">All models use Student-t likelihood. Priors: &alpha;<sub>i</sub> ~ N(0, &sigma;<sub>&alpha;</sub>), &beta;<sub>j</sub> ~ N(0, &sigma;<sub>&beta;</sub>), log(w<sub>k</sub>) ~ N(0,5). Non-centered parameterization via SVI. Models 1t/2c use first-attempt data only; 2r uses all data including repeat solves.</p>
    </div>
  </details>
  <details>
    <summary>Physical basis components g<sub>k</sub>(N)</summary>
    <div class="details-content">
      <p class="footnote">Model 2c sums physical processes additively in time space: time(N) = &Sigma;<sub>k</sub> w<sub>k</sub> g<sub>k</sub>(N), then converts to mB. Each curve shows one component's contribution (mB relative to N=500). The dominant process at each piece count determines the scaling behavior.</p>
      <div class="chart-container"><div id="chart-basis"></div></div>
    </div>
  </details>
</section>

<!-- Model Comparison -->
<section>
  <h2>Model Comparison</h2>
  <p>All models fitted via stochastic variational inference (SVI). Select models to compare:</p>
  <div class="model-selector" id="model-selector"></div>
  <div class="chart-row">
    <div class="chart-container"><div id="chart-metrics"></div></div>
    <div class="chart-container"><div id="chart-loss"></div></div>
  </div>
  <details>
    <summary>Full metrics table</summary>
    <div class="details-content"><table id="metrics-table"></table></div>
  </details>
  <details>
    <summary>Residual analysis</summary>
    <div class="details-content">
      <p class="footnote">Predicted vs actual time (mB) on held-out test set. Points near the diagonal indicate good predictions.</p>
      <div class="model-selector" id="residual-selector"></div>
      <div class="chart-container"><div id="chart-residuals"></div></div>
    </div>
  </details>
</section>

<!-- Model 2r Deep Dive -->
<section id="section-model2r">
  <h2>Model 2r Deep Dive</h2>
  <p>Model 2r is the production model: Student-t likelihood, per-puzzler velocity, physical piece-count basis, and a practice effect for repeat solves. Trained on all data.</p>
  <details open>
    <summary>Model specification (mB scale)</summary>
    <div class="details-content">
      <p>The predicted solving time in milliBels decomposes as:</p>
      <div class="equation">mB(time<sub>ij</sub>) = D<sub>j</sub> + f(N<sub>j</sub>) &minus; R<sub>i</sub>(y) + &gamma;&middot;log(solve#) + &epsilon;</div>
      <table>
        <tr><th>Term</th><th>Definition</th><th>Zero means</th><th>Learned scale</th></tr>
        <tr>
          <td>D<sub>j</sub></td>
          <td>Puzzle difficulty = &mu; + &beta;<sub>j</sub></td>
          <td>&beta;<sub>j</sub> = 0 &rarr; average puzzle (given its piece count)</td>
          <td id="m2r-spec-D"></td>
        </tr>
        <tr>
          <td>f(N<sub>j</sub>)</td>
          <td>Piece-count correction = 1000&middot;log<sub>10</sub>(&Sigma;<sub>k</sub> w<sub>k</sub> g<sub>k</sub>(N)) &minus; ref</td>
          <td>f = 0 at N = 500 pieces</td>
          <td id="m2r-spec-f"></td>
        </tr>
        <tr>
          <td>R<sub>i</sub>(y)</td>
          <td>Puzzler rating at year y = &alpha;&#x0303;<sub>i</sub> + v<sub>i</sub>(y &minus; 2026)</td>
          <td>R = 0 &rarr; average-speed puzzler in 2026</td>
          <td id="m2r-spec-R"></td>
        </tr>
        <tr>
          <td>&gamma;&middot;log(solve#)</td>
          <td>Practice effect (negative = faster with repetition)</td>
          <td>solve# = 1 &rarr; no effect (first attempt)</td>
          <td id="m2r-spec-gamma"></td>
        </tr>
        <tr>
          <td>&epsilon;</td>
          <td>Noise ~ Student-t(&nu;, 0, &sigma;)</td>
          <td>—</td>
          <td id="m2r-spec-eps"></td>
        </tr>
      </table>
      <p class="footnote">Here &alpha;&#x0303;<sub>i</sub> = &minus;(&alpha;<sub>i</sub> + &delta;<sub>0</sub> + &delta;<sub>i</sub>) is the puzzler skill projected to 2026, and v<sub>i</sub> = &minus;(&delta;<sub>0</sub> + &delta;<sub>i</sub>) is the improvement rate in mB/yr (positive = getting faster). The sign convention: higher R = faster puzzler, higher D = harder puzzle, so predicted time = difficulty minus skill.</p>
    </div>
  </details>
  <details open>
    <summary>Scalar parameters</summary>
    <div class="details-content">
      <table id="m2r-scalar-table"></table>
    </div>
  </details>
  <details open>
    <summary>Student-t vs Normal: how heavy are the tails?</summary>
    <div class="details-content">
      <p class="footnote">The learned degrees of freedom &nu; controls tail heaviness. Lower &nu; = heavier tails = more robust to outliers.</p>
      <div class="chart-container"><div id="chart-student-t"></div></div>
    </div>
  </details>
  <details open>
    <summary>Practice curve</summary>
    <div class="details-content">
      <p class="footnote">Expected time change from repeated solving. Each additional solve makes the puzzler faster. The shaded band shows the 80% credible interval from the &gamma; posterior.</p>
      <div class="chart-container"><div id="chart-practice-curve"></div></div>
    </div>
  </details>
  <details open>
    <summary>Repeat statistics</summary>
    <div class="details-content">
      <div class="stat-grid" id="repeat-stat-grid"></div>
    </div>
  </details>
  <details>
    <summary>Learned piece-count correction</summary>
    <div class="details-content">
      <p class="footnote">The learned piece-count correction as a function of N. Physical processes (edge scanning, per-piece work, search, combinatorial matching) sum additively in time, then convert to mB centered at N=500. This gives sensible extrapolation: at large N, log(time) grows as at most 2·log(N). Shaded bands show posterior deciles from the log(w<sub>k</sub>) posterior.</p>
      <div class="chart-container"><div id="chart-response-curves"></div></div>
    </div>
  </details>
  <details>
    <summary>Process contributions by piece count</summary>
    <div class="details-content">
      <p class="footnote">Fraction of total predicted solving time attributable to each physical process. Since the model sums processes additively in time space (time = &Sigma; w<sub>k</sub> g<sub>k</sub>(N)), the fraction w<sub>k</sub> g<sub>k</sub>(N) / &Sigma;<sub>j</sub> w<sub>j</sub> g<sub>j</sub>(N) gives each process's share. At small N, edge-related work dominates; at large N, combinatorial/search effects take over.</p>
      <div class="chart-container"><div id="chart-basis-fractions-2r"></div></div>
    </div>
  </details>
</section>

<!-- Prediction Calculator -->
<section>
  <h2>Prediction Calculator</h2>
  <p>Pick a puzzler and puzzle, choose a year, and see the model's full predicted time distribution.</p>
  <div class="pred-controls">
    <div>
      <label for="pred-puzzler">Puzzler</label>
      <input type="text" id="pred-puzzler" list="pred-puzzler-list" placeholder="— Average Puzzler —">
      <datalist id="pred-puzzler-list"></datalist>
    </div>
    <div>
      <label for="pred-puzzle">Puzzle</label>
      <input type="text" id="pred-puzzle" list="pred-puzzle-list" placeholder="— Average Puzzle —">
      <datalist id="pred-puzzle-list"></datalist>
      <div id="pred-custom-pieces" style="margin-top:6px; display:none;">
        <label for="pred-pieces" style="display:inline; text-transform:none; font-weight:400;">Pieces:</label>
        <input type="number" id="pred-pieces" class="pred-piece-count" value="500" min="10" max="10000">
      </div>
    </div>
    <div>
      <label for="pred-year">Year <span class="pred-year-display" id="pred-year-val">2026.0</span></label>
      <input type="range" id="pred-year" min="2020" max="2030" step="0.5" value="2026" style="width:100%; margin-top:8px;">
    </div>
    <div>
      <label for="pred-solve-num">Solve # <span id="pred-solve-num-val">1</span></label>
      <input type="range" id="pred-solve-num" min="1" max="10" step="1" value="1" style="width:100%; margin-top:8px;">
      <p class="footnote" id="pred-practice-note" style="margin-top:4px; display:none;"></p>
    </div>

                });

            function buildApp(DATA) {
                const fmt = d3.format(".4f");
                const fmt2 = d3.format(".2f");
                const fmt1 = d3.format(".1f");
                const fmtPct = d3.format(".1%");
                const fmtInt = d3.format(",");

                const COLORS = {
                    model_0: "#4a7fb5",
                    model_1: "#55a868",
                    model_1t: "#3a9a58",
                    model_2: "#2d8a4e",
                    model_2c: "#0e6a2e",
                    model_2r: "#e377c2",
                    model_3: "#dd8452",
                };
                const MODEL_NAMES = {
                    model_0: "Model 0: IRT",
                    model_1: "Model 1: + log(N)",
                    model_1t: "Model 1t: Student-t",
                    model_2: "Model 2: + basis \u03c6",
                    model_2c: "Model 2c: + velocity",
                    model_2r: "Model 2r: + practice",
                    model_3: "Model 3: + interaction",
                };
                const availableModels = Object.keys(MODEL_NAMES).filter(
                    (k) => DATA.models[k],
                );

                const tooltip = d3.select("#tooltip");
                function showTip(event, html) {
                    tooltip.html(html).style("display", "block");
                    const r = tooltip.node().getBoundingClientRect();
                    let x = event.pageX + 12,
                        y = event.pageY - 12;
                    if (x + r.width > window.innerWidth - 20)
                        x = event.pageX - r.width - 12;
                    tooltip.style("left", x + "px").style("top", y + "px");
                }
                function hideTip() {
                    tooltip.style("display", "none");
                }

                function makeAxis(svg, xS, yS, w, h, m, xL, yL) {
                    svg.append("g")
                        .attr("class", "axis")
                        .attr("transform", `translate(0,${h - m.bottom})`)
                        .call(d3.axisBottom(xS).ticks(6))
                        .append("text")
                        .attr("x", w / 2)
                        .attr("y", 36)
                        .style("text-anchor", "middle")
                        .style("font-size", "12px")
                        .style("fill", "#6e6e6e")
                        .text(xL);
                    svg.append("g")
                        .attr("class", "axis")
                        .attr("transform", `translate(${m.left},0)`)
                        .call(d3.axisLeft(yS).ticks(5))
                        .append("text")
                        .attr("transform", "rotate(-90)")
                        .attr("x", -h / 2)
                        .attr("y", -40)
                        .style("text-anchor", "middle")
                        .style("font-size", "12px")
                        .style("fill", "#6e6e6e")
                        .text(yL);
                }

                // --- Populate ---
                const S = DATA.stats;
                document.getElementById("meta-records").textContent =
                    `${fmtInt(S.n_records)} records`;
                document.getElementById("meta-puzzlers").textContent =
                    `${fmtInt(S.n_puzzlers)} puzzlers`;
                document.getElementById("meta-puzzles").textContent =
                    `${fmtInt(S.n_puzzles)} puzzles`;

                const repeatStats = DATA.model2r_detail ? DATA.model2r_detail.repeat_stats : null;
                document.getElementById("stat-grid").innerHTML = [
                    { value: fmtInt(S.n_records), label: "Total Records" },
                    { value: fmtInt(S.n_puzzlers), label: "Unique Puzzlers" },
                    { value: fmtInt(S.n_puzzles), label: "Unique Puzzles" },
                    { value: S.piece_counts.length, label: "Piece Counts" },
                    { value: fmt2(S.log_time_mean), label: "Mean (mB)" },
                    repeatStats ? { value: fmtInt(repeatStats.n_repeat), label: "Repeat Solves" }
                               : { value: fmt2(S.log_time_std), label: "Std (mB)" },
                ]
                    .map(
                        (s) =>
                            `<div class="stat-card"><span class="value">${s.value}</span><span class="label">${s.label}</span></div>`,
                    )
                    .join("");

                document.getElementById("param-mu").textContent = S.mu;
                document.getElementById("param-sigma").textContent = S.sigma;
                if (S.delta_0 != null)
                    document.getElementById("param-delta0").textContent =
                        Math.round(-S.delta_0);
                if (S.sigma_delta != null)
                    document.getElementById("param-sigma-delta").textContent =
                        S.sigma_delta.toFixed(1);
                if (S.ranking_year) {
                    const label = S.ranking_date || S.ranking_year.toFixed(1);
                    document
                        .querySelectorAll("#ranking-year, .ranking-year-label")
                        .forEach((el) => (el.textContent = label));
                }

                const nP = S.n_puzzlers,
                    nPz = S.n_puzzles;
                // Model 1t: mu(fixed) + sigma + nu + sigma_alpha + sigma_beta + c_pieces + alpha_i + beta_j
                document.getElementById("m1t-params").textContent =
                    `~${fmtInt(nP + nPz + 6)}`;
                // Model 2c: + 4 log_w + delta_0 + sigma_delta + delta_i per puzzler
                document.getElementById("m2c-params").textContent =
                    `~${fmtInt(2 * nP + nPz + 12)}`;
                // Model 2r: 2c + gamma
                const m2rEl = document.getElementById("m2r-params");
                if (m2rEl)
                    m2rEl.textContent = `~${fmtInt(2 * nP + nPz + 13)}`;

                // --- Scatter ---
                (function () {
                    const W = 400,
                        H = 300,
                        mg = { top: 28, right: 16, bottom: 44, left: 56 };
                    const svg = d3
                        .select("#chart-scatter")
                        .append("svg")
                        .attr("viewBox", `0 0 ${W} ${H}`)
                        .attr("width", "100%");
                    svg.append("text")
                        .attr("class", "chart-title")
                        .attr("x", W / 2)
                        .attr("y", 16)
                        .attr("text-anchor", "middle")
                        .text("Completion Time vs Pieces");
                    const x = d3
                        .scaleLog()
                        .domain([80, 1100])
                        .range([mg.left, W - mg.right]);
                    const y = d3
                        .scaleLog()
                        .domain([60, 30000])
                        .range([H - mg.bottom, mg.top]);
                    makeAxis(svg, x, y, W, H, mg, "Pieces", "Time (seconds)");
                    svg.selectAll("circle")
                        .data(DATA.scatter)
                        .enter()
                        .append("circle")
                        .attr("cx", (d) => x(d.p))
                        .attr("cy", (d) => y(d.t))
                        .attr("r", 1.5)
                        .attr("fill", "#4a7fb5")
                        .attr("opacity", 0.2);
                })();

                // --- Piece distribution ---
                (function () {
                    const W = 400,
                        H = 300,
                        mg = { top: 28, right: 16, bottom: 56, left: 56 };
                    const svg = d3
                        .select("#chart-piece-dist")
                        .append("svg")
                        .attr("viewBox", `0 0 ${W} ${H}`)
                        .attr("width", "100%");
                    svg.append("text")
                        .attr("class", "chart-title")
                        .attr("x", W / 2)
                        .attr("y", 16)
                        .attr("text-anchor", "middle")
                        .text("Records by Piece Count");
                    const data = DATA.piece_dist;
                    // Log-scaled x axis: position bars by log(pieces), width from gap to next value
                    const pcs = data.map((d) => d.pieces);
                    const x = d3
                        .scaleLog()
                        .domain([d3.min(pcs) * 0.85, d3.max(pcs) * 1.15])
                        .range([mg.left, W - mg.right]);
                    const y = d3
                        .scaleLinear()
                        .domain([0, d3.max(data, (d) => d.count)])
                        .range([H - mg.bottom, mg.top]);
                    svg.append("g")
                        .attr("class", "axis")
                        .attr("transform", `translate(0,${H - mg.bottom})`)
                        .call(
                            d3
                                .axisBottom(x)
                                .tickValues([
                                    100, 200, 300, 500, 750, 1000, 1500, 2000,
                                    3000,
                                ])
                                .tickFormat(d3.format("d")),
                        )
                        .selectAll("text")
                        .attr("transform", "rotate(-40)")
                        .style("text-anchor", "end");
                    svg.append("g")
                        .attr("class", "axis")
                        .attr("transform", `translate(${mg.left},0)`)
                        .call(d3.axisLeft(y).ticks(5));
                    // Bar width: half the log-space gap to nearest neighbor, clamped
                    const barW = (d, i) => {
                        const lo =
                            i > 0
                                ? (x(d.pieces) - x(pcs[i - 1])) / 2
                                : (x(pcs[1]) - x(d.pieces)) / 2;
                        const hi =
                            i < pcs.length - 1
                                ? (x(pcs[i + 1]) - x(d.pieces)) / 2
                                : lo;
                        return Math.max(1, Math.min(lo + hi, 20));
                    };
                    svg.selectAll(".bar")
                        .data(data)
                        .enter()
                        .append("rect")
                        .attr("x", (d, i) => {
                            const w = barW(d, i);
                            return x(d.pieces) - w / 2;
                        })
                        .attr("y", (d) => y(d.count))
                        .attr("width", (d, i) => barW(d, i))
                        .attr("height", (d) => H - mg.bottom - y(d.count))
                        .attr("fill", "#4a7fb5")
                        .attr("opacity", 0.7)
                        .on("mouseover", function (event, d) {
                            d3.select(this).attr("opacity", 1);
                            showTip(
                                event,
                                `<span class="tt-label">Pieces:</span> <span class="tt-value">${d.pieces}</span><br><span class="tt-label">Records:</span> <span class="tt-value">${fmtInt(d.count)}</span>`,
                            );
                        })
                        .on("mousemove", (event) =>
                            showTip(event, tooltip.html()),
                        )
                        .on("mouseout", function () {
                            d3.select(this).attr("opacity", 0.7);
                            hideTip();
                        });
                })();

                // --- Histograms ---
                (function () {
                    const container = d3.select("#chart-histograms");
                    Object.keys(DATA.histograms)
                        .map(Number)
                        .sort((a, b) => a - b)
                        .forEach((pc) => {
                            const h = DATA.histograms[pc];
                            const W = 250,
                                H = 160,
                                mg = {
                                    top: 24,
                                    right: 8,
                                    bottom: 32,
                                    left: 36,
                                };
                            const div = container
                                .append("div")
                                .style("min-width", "200px");
                            const svg = div
                                .append("svg")
                                .attr("viewBox", `0 0 ${W} ${H}`)
                                .attr("width", "100%");
                            svg.append("text")
                                .attr("class", "chart-title")
                                .attr("x", W / 2)
                                .attr("y", 14)
                                .attr("text-anchor", "middle")
                                .style("font-size", "11px")
                                .text(`${pc} pcs (n=${fmtInt(h.n)})`);
                            const x = d3
                                .scaleLinear()
                                .domain([
                                    h.edges[0],
                                    h.edges[h.edges.length - 1],
                                ])
                                .range([mg.left, W - mg.right]);
                            const y = d3
                                .scaleLinear()
                                .domain([0, d3.max(h.counts)])
                                .range([H - mg.bottom, mg.top]);
                            svg.append("g")
                                .attr("class", "axis")
                                .attr(
                                    "transform",
                                    `translate(0,${H - mg.bottom})`,
                                )
                                .call(
                                    d3
                                        .axisBottom(x)
                                        .ticks(4)
                                        .tickFormat(d3.format(".1f")),
                                );
                            svg.append("g")
                                .attr("class", "axis")
                                .attr("transform", `translate(${mg.left},0)`)
                                .call(d3.axisLeft(y).ticks(3));
                            h.counts.forEach((c, i) => {
                                svg.append("rect")
                                    .attr("x", x(h.edges[i]))
                                    .attr("y", y(c))
                                    .attr(
                                        "width",
                                        Math.max(
                                            0,
                                            x(h.edges[i + 1]) -
                                                x(h.edges[i]) -
                                                1,
                                        ),
                                    )
                                    .attr("height", H - mg.bottom - y(c))
                                    .attr("fill", "#4a7fb5")
                                    .attr("opacity", 0.7);
                            });
                        });
                })();

                // --- Puzzler frequency ---
                (function () {
                    const freq = DATA.puzzler_freq;
                    const W = 600,
                        H = 250,
                        mg = { top: 28, right: 16, bottom: 44, left: 56 };
                    const svg = d3
                        .select("#chart-puzzler-freq")
                        .append("svg")
                        .attr("viewBox", `0 0 ${W} ${H}`)
                        .attr("width", "100%");
                    svg.append("text")
                        .attr("class", "chart-title")
                        .attr("x", W / 2)
                        .attr("y", 16)
                        .attr("text-anchor", "middle")
                        .text("Puzzler Observation Frequency");
                    const bins = freq.counts.map((c, i) => ({
                        x0: freq.edges[i],
                        x1: freq.edges[i + 1],
                        count: c,
                    }));
                    const x = d3
                        .scaleLinear()
                        .domain([0, freq.edges[freq.edges.length - 1]])
                        .range([mg.left, W - mg.right]);
                    const y = d3
                        .scaleLog()
                        .domain([0.5, d3.max(freq.counts) * 1.2])
                        .range([H - mg.bottom, mg.top]);
                    makeAxis(
                        svg,
                        x,
                        y,
                        W,
                        H,
                        mg,
                        "Number of records per puzzler",
                        "Count (log)",
                    );
                    svg.selectAll(".bar")
                        .data(bins)
                        .enter()
                        .append("rect")
                        .attr("x", (d) => x(d.x0) + 1)
                        .attr("y", (d) =>
                            d.count > 0 ? y(d.count) : H - mg.bottom,
                        )
                        .attr("width", (d) =>
                            Math.max(0, x(d.x1) - x(d.x0) - 1),
                        )
                        .attr("height", (d) =>
                            d.count > 0 ? H - mg.bottom - y(d.count) : 0,
                        )
                        .attr("fill", "#4a7fb5")
                        .attr("opacity", 0.7);
                })();

                // (Puzzler alpha distribution is drawn below in the Rankings section)

                // --- Puzzle beta distribution ---
                (function () {
                    if (!DATA.puzzle_beta_dist) return;
                    const dist = DATA.puzzle_beta_dist;
                    const W = 600,
                        H = 250,
                        mg = { top: 28, right: 16, bottom: 44, left: 56 };
                    const svg = d3
                        .select("#chart-beta-dist")
                        .append("svg")
                        .attr("viewBox", `0 0 ${W} ${H}`)
                        .attr("width", "100%");
                    svg.append("text")
                        .attr("class", "chart-title")
                        .attr("x", W / 2)
                        .attr("y", 16)
                        .attr("text-anchor", "middle")
                        .text("Puzzle Difficulty Distribution");
                    const bins = dist.counts.map((c, i) => ({
                        x0: dist.edges[i],
                        x1: dist.edges[i + 1],
                        count: c,
                    }));
                    const x = d3
                        .scaleLinear()
                        .domain([
                            dist.edges[0],
                            dist.edges[dist.edges.length - 1],
                        ])
                        .range([mg.left, W - mg.right]);
                    const y = d3
                        .scaleLinear()
                        .domain([0, d3.max(dist.counts) * 1.1])
                        .range([H - mg.bottom, mg.top]);
                    makeAxis(
                        svg,
                        x,
                        y,
                        W,
                        H,
                        mg,
                        "Puzzle difficulty (mB, higher = harder)",
                        "Count",
                    );
                    // Stacked bars by observation count
                    const groups = [
                        { label: "n=1", key: "n1", color: "#c44e52" },
                        { label: "n=2-5", key: "n2_5", color: "#e8a838" },
                        { label: "n≥6", key: "n6plus", color: "#4a7fb5" },
                    ];
                    bins.forEach((b, i) => {
                        let cumul = 0;
                        groups.forEach((g) => {
                            const count = dist[g.key] ? dist[g.key][i] : 0;
                            svg.append("rect")
                                .attr("x", x(b.x0) + 1)
                                .attr("y", y(cumul + count))
                                .attr(
                                    "width",
                                    Math.max(0, x(b.x1) - x(b.x0) - 1),
                                )
                                .attr("height", y(cumul) - y(cumul + count))
                                .attr("fill", g.color)
                                .attr("opacity", 0.7);
                            cumul += count;
                        });
                    });
                    const lg = svg
                        .append("g")
                        .attr(
                            "transform",
                            `translate(${W - mg.right - 160}, ${mg.top + 5})`,

                    groups.forEach((g, i) => {
                        lg.append("rect")
                            .attr("x", 0)
                            .attr("y", i * 16)
                            .attr("width", 10)
                            .attr("height", 10)
                            .attr("fill", g.color)
                            .attr("opacity", 0.7);
                        lg.append("text")
                            .attr("x", 14)
                            .attr("y", i * 16 + 9)
                            .style("font-size", "11px")
                            .text(g.label);
                    });
                })();

                // --- Model comparison ---
                let activeModels = new Set(availableModels);
                let activeResModel = availableModels.includes("model_2r")
                    ? "model_2r"
                    : availableModels[availableModels.length - 1];

                function renderSelector(
                    containerId,
                    models,
                    active,
                    onClick,
                    isSet,
                ) {
                    const c = d3.select("#" + containerId);
                    c.html("");
                    availableModels.forEach((key) => {
                        const isActive = isSet
                            ? active.has(key)
                            : active === key;
                        c.append("button")
                            .attr(
                                "class",
                                `model-btn ${isActive ? "active" : ""}`,
                            )
                            .style(
                                "border-color",
                                isActive ? COLORS[key] : null,
                            )
                            .style("background", isActive ? COLORS[key] : null)
                            .text(MODEL_NAMES[key])
                            .on("click", () => onClick(key));
                    });
                }

                function renderMetricsChart() {
                    const c = d3.select("#chart-metrics");
                    c.html("");
                    const models = [...activeModels]
                        .filter((m) => DATA.models[m])
                        .sort();
                    if (models.length === 0) return;
                    const W = 400,
                        H = 280,
                        mg = { top: 28, right: 16, bottom: 60, left: 72 };
                    const svg = c
                        .append("svg")
                        .attr("viewBox", `0 0 ${W} ${H}`)
                        .attr("width", "100%");
                    svg.append("text")
                        .attr("class", "chart-title")
                        .attr("x", W / 2)
                        .attr("y", 16)
                        .attr("text-anchor", "middle")
                        .text("Test Set: Mean Predictive Log-Density");
                    // Higher (less negative) is better
                    const vals = models.map(
                        (m) => DATA.models[m].test_mean_lpd || 0,
                    );
                    const yMin = d3.min(vals);
                    const yMax = d3.max(vals);
                    const pad = Math.max((yMax - yMin) * 0.15, 0.1);
                    const x = d3
                        .scaleBand()
                        .domain(models)
                        .range([mg.left, W - mg.right])
                        .padding(0.3);
                    const y = d3
                        .scaleLinear()
                        .domain([yMin - pad, yMax + pad])
                        .range([H - mg.bottom, mg.top]);
                    svg.append("g")
                        .attr("class", "axis")
                        .attr("transform", `translate(0,${H - mg.bottom})`)
                        .call(
                            d3
                                .axisBottom(x)
                                .tickFormat(
                                    (m) => MODEL_NAMES[m].split(":")[0],
                                ),
                        )
                        .selectAll("text")
                        .style("font-size", "10px")
                        .attr("transform", "rotate(-30)")
                        .style("text-anchor", "end");
                    svg.append("g")
                        .attr("class", "axis")
                        .attr("transform", `translate(${mg.left},0)`)
                        .call(
                            d3
                                .axisLeft(y)
                                .ticks(6)
                                .tickFormat(d3.format(".2f")),
                        );
                    svg.append("text")
                        .attr("transform", "rotate(-90)")
                        .attr("x", -(mg.top + H - mg.bottom) / 2)
                        .attr("y", 14)
                        .attr("text-anchor", "middle")
                        .style("font-size", "11px")
                        .text("mean log p(y_test | θ)");

                    const bestLpd = d3.max(vals);
                    models.forEach((m) => {
                        const v = DATA.models[m].test_mean_lpd || 0;
                        svg.append("rect")
                            .attr("x", x(m))
                            .attr("y", y(Math.max(v, y.domain()[0])))
                            .attr("width", x.bandwidth())
                            .attr(
                                "height",
                                Math.max(
                                    0,
                                    y(y.domain()[0]) -
                                        y(Math.max(v, y.domain()[0])),
                                ),
                            )
                            .attr("fill", COLORS[m])
                            .attr("opacity", v === bestLpd ? 1 : 0.7)
                            .attr("rx", 2)
                            .on("mouseover", function (event) {
                                d3.select(this).attr("opacity", 1);
                                showTip(
                                    event,
                                    `<span class="tt-label">${MODEL_NAMES[m]}</span><br><span class="tt-label">Mean LPD:</span> <span class="tt-value">${v.toFixed(4)}</span>`,
                                );
                            })
                            .on("mousemove", (event) =>
                                showTip(event, tooltip.html()),
                            )
                            .on("mouseout", function () {
                                d3.select(this).attr(
                                    "opacity",
                                    v === bestLpd ? 1 : 0.7,
                                );
                                hideTip();
                            });
                    });
                }

                function renderLossChart() {
                    const c = d3.select("#chart-loss");
                    c.html("");
                    const models = [...activeModels]
                        .filter((m) => DATA.models[m])
                        .sort();
                    if (models.length === 0) return;
                    const W = 400,
                        H = 280,
                        mg = { top: 28, right: 16, bottom: 44, left: 64 };
                    const svg = c
                        .append("svg")
                        .attr("viewBox", `0 0 ${W} ${H}`)
                        .attr("width", "100%");
                    svg.append("text")
                        .attr("class", "chart-title")
                        .attr("x", W / 2)
                        .attr("y", 16)
                        .attr("text-anchor", "middle")
                        .text("Training Loss (ELBO)");
                    const allL = models.flatMap(
                        (m) => DATA.models[m].loss_curve,
                    );
                    const yMin = d3.min(allL);
                    const yMax = d3.quantile(
                        allL.slice().sort((a, b) => a - b),
                        0.95,
                    );
                    const pad = (yMax - yMin) * 0.05;
                    const x = d3
                        .scaleLinear()
                        .domain([0, 5000])
                        .range([mg.left, W - mg.right]);
                    const y = d3
                        .scaleLinear()
                        .domain([yMin - pad, yMax + pad])
                        .range([H - mg.bottom, mg.top]);
                    makeAxis(svg, x, y, W, H, mg, "SVI Step", "ELBO Loss");
                    models.forEach((m) => {
                        const line = d3
                            .line()
                            .x((d, i) => x(i * 10))
                            .y((d) => y(d))
                            .defined((d) => d <= yMax + pad);
                        svg.append("path")
                            .datum(DATA.models[m].loss_curve)
                            .attr("d", line)
                            .attr("fill", "none")
                            .attr("stroke", COLORS[m])
                            .attr("stroke-width", 1.5)
                            .attr("opacity", 0.8);
                    });

                function renderMetricsTable() {
                    const t = d3.select("#metrics-table");

                    thead.append("th").text("Metric");
                    Object.keys(MODEL_NAMES).forEach((m) =>
                        thead
                            .append("th")
                            .text(MODEL_NAMES[m].split(":")[0])
                            .attr("class", "num"),
                    );
                    thead.append("th").text("Baseline").attr("class", "num");
                    const tbody = t.append("tbody");

                    // Test predictive log-likelihood (primary metric)
                    const bestLpd = d3.max(
                        Object.keys(MODEL_NAMES)
                            .map(
                                (m) =>
                                    DATA.models[m] &&
                                    DATA.models[m].test_mean_lpd,
                            )
                            .filter((v) => v != null),
                    );
                    const trLpd = tbody
                        .append("tr")
                        .style("font-weight", "600");

                    Object.keys(MODEL_NAMES).forEach((m) => {
                        const md = DATA.models[m];
                        const v = md ? md.test_mean_lpd : null;
                        const td = trLpd.append("td").attr("class", "num");
                        if (v != null) {
                            td.text(v.toFixed(4));
                            if (v === bestLpd)
                                td.style("color", "var(--green)");
                        } else {
                            td.text("-");
                        }
                    });
                    trLpd.append("td");

                    const trTlppd = tbody.append("tr");
                    trTlppd
                        .append("td")
                        .style("color", "var(--text-light)")
                        .text("  Total Test LPPD");
                    Object.keys(MODEL_NAMES).forEach((m) => {
                        const md = DATA.models[m];
                        trTlppd
                            .append("td")
                            .attr("class", "num")
                            .style("color", "var(--text-light)")
                            .text(
                                md && md.test_lppd != null
                                    ? fmt1(md.test_lppd)
                                    : "-",

                    trObs.append("td").style("color", "var(--text-light)").text("  Train / Test obs");
                    Object.keys(MODEL_NAMES).forEach((m) => {
                        const md = DATA.models[m];
                        trObs.append("td").attr("class", "num")
                            .style("color", "var(--text-light)")
                            .style("font-size", "12px")
                            .text(md && md.n_train != null
                                ? fmtInt(md.n_train) + " / " + fmtInt(md.n_test)
                                : "-");
                    });
                    trObs.append("td");

                    // Separator, then secondary metrics
                    const metrics = [
                        {
                            key: "coverage_90",
                            label: "90% Coverage",
                            bl: null,
                            f: fmtPct,
                        },
                        {
                            key: "coverage_50",
                            label: "50% Coverage",
                            bl: null,
                            f: fmtPct,
                        },
                        { key: "mae_log", label: "MAE (mB)", bl: null },
                    ];
                    metrics.forEach((mk) => {
                        const tr = tbody.append("tr");
                        tr.append("td").text(mk.label);
                        const fn = mk.f || fmt;
                        Object.keys(MODEL_NAMES).forEach((m) => {
                            const md = DATA.models[m];
                            const v = md ? md.test_metrics[mk.key] : null;
                            tr.append("td")
                                .attr("class", "num")
                                .text(v != null ? fn(v) : "-");
                        });
                        tr.append("td");
                    });

                    // WAIC row
                    const hasWaic = availableModels.some(
                        (m) => DATA.models[m].waic != null,
                    );
                    if (hasWaic) {
                        const bestWaic = d3.min(
                            availableModels,
                            (m) => DATA.models[m].waic,
                        );
                        const trW = tbody.append("tr");
                        trW.append("td")
                            .style("font-weight", "600")
                            .text("WAIC");
                        Object.keys(MODEL_NAMES).forEach((m) => {
                            const md = DATA.models[m];
                            const v = md && md.waic != null ? md.waic : null;
                            const td = trW.append("td").attr("class", "num");
                            if (v != null) {
                                td.text(fmt1(v));
                                if (v === bestWaic)
                                    td.style("font-weight", "600").style(
                                        "color",
                                        "var(--green)",
                                    );
                            } else {
                                td.text("-");
                            }
                        });
                        trW.append("td");

                        const trP = tbody.append("tr");
                        trP.append("td")
                            .style("color", "var(--text-light)")
                            .text("  p_waic (eff. params)");
                        Object.keys(MODEL_NAMES).forEach((m) => {
                            const md = DATA.models[m];
                            trP.append("td")
                                .attr("class", "num")
                                .style("color", "var(--text-light)")
                                .text(
                                    md && md.p_waic != null
                                        ? fmt1(md.p_waic)
                                        : "-",
                                );
                        });
                        trP.append("td");

                        const trD = tbody.append("tr");
                        trD.append("td")
                            .style("color", "var(--text-light)")
                            .text("  \u0394WAIC");
                        Object.keys(MODEL_NAMES).forEach((m) => {
                            const md = DATA.models[m];
                            const v =
                                md && md.waic != null
                                    ? md.waic - bestWaic
                                    : null;
                            trD.append("td")
                                .attr("class", "num")
                                .style("color", "var(--text-light)")
                                .text(
                                    v != null
                                        ? v === 0
                                            ? "0 (best)"
                                            : "+" + fmt1(v)
                                        : "-",
                                );
                        });
                        trD.append("td");
                    }
                }

                function renderPuzzlerTable(filter = "") {
                    const t = d3.select("#puzzler-table");
                    t.html("");
                    const thead = t.append("thead").append("tr");
                    [
                        "Rank",
                        "Puzzler",
                        "mB",
                        "\u03c3",
                        "mB (Wilson)",
                        "\u0394mB/yr",
                        "Years",
                        "Obs",
                    ].forEach((h, i) =>
                        thead
                            .append("th")
                            .text(h)
                            .attr("class", i !== 1 ? "num" : null),
                    );
                    const filtered = DATA.puzzlers.filter((d) =>
                        d.name.toLowerCase().includes(filter.toLowerCase()),
                    );
                    const tbody = t.append("tbody");
                    const maxElo = d3.max(
                        DATA.puzzlers
                            .slice(0, 50)
                            .map(
                                (d) =>
                                    d.elo ||
                                    (DATA.stats.elo_center || 1500) - d.alpha,
                            ),
                    );
                    const minElo = d3.min(
                        DATA.puzzlers
                            .slice(0, 50)
                            .map(
                                (d) =>
                                    d.elo ||
                                    (DATA.stats.elo_center || 1500) - d.alpha,
                            ),
                    );
                    filtered.slice(0, 50).forEach((d) => {
                        const elo =
                            d.elo != null
                                ? d.elo
                                : Math.round(
                                      (DATA.stats.elo_center || 1500) - d.alpha,
                                  );
                        const eloW =
                            d.elo_wilson != null
                                ? d.elo_wilson
                                : Math.round(
                                      (DATA.stats.elo_center || 1500) -
                                          (d.alpha + 3 * d.std),
                                  );
                        const tr = tbody.append("tr");
                        tr.append("td")
                            .attr("class", "num")
                            .text(DATA.puzzlers.indexOf(d) + 1);
                        tr.append("td").text(d.name);
                        const td = tr
                            .append("td")
                            .attr("class", "num bar-cell");
                        td.append("div")
                            .attr("class", "bar-bg")
                            .style(
                                "width",
                                ((elo - 1500) / (maxElo - 1500)) * 80 + "%",
                            )
                            .style(
                                "background",
                                elo > 1500 ? "var(--green)" : "var(--red)",
                            );
                        td.append("span").text(fmtInt(elo));
                        tr.append("td")
                            .attr("class", "num")
                            .style("color", "var(--text-light)")
                            .text(Math.round(d.std));
                        tr.append("td")
                            .attr("class", "num")
                            .style("font-weight", "600")
                            .text(fmtInt(eloW));
                        // Velocity: v_i in mB/yr, positive = getting faster
                        const vel = d.velocity != null ? d.velocity : null;
                        const velRound = vel != null ? Math.round(vel) : null;
                        const velColor =
                            velRound > 0
                                ? "var(--green)"
                                : velRound < 0
                                  ? "var(--red)"
                                  : "var(--text-light)";
                        tr.append("td")
                            .attr("class", "num")
                            .style("color", velColor)
                            .text(
                                velRound != null
                                    ? (velRound > 0 ? "+" : "") + velRound
                                    : "—",
                            );
                        const years =
                            d.yr_min && d.yr_max && d.yr_min !== d.yr_max
                                ? `${d.yr_min}-${d.yr_max}`
                                : d.yr_max || "—";
                        tr.append("td")
                            .attr("class", "num")
                            .style("color", "var(--text-light)")
                            .text(years);
                        tr.append("td").attr("class", "num").text(d.n);
                    });

                let hardPcFilter = 0,
                    easyPcFilter = 0;
                let hardSourceFilter = "",

                    const t = d3.select("#puzzle-table");
                    t.html("");
                    const thead = t.append("thead").append("tr");
                    [
                        "Rank",
                        "",
                        "Puzzle",
                        "Pieces",
                        "Difficulty (mB)",
                        "\u03c3",
                        "\u03b2 (Wilson)",

                    ].forEach((h, i) =>
                        thead
                            .append("th")
                            .text(h)
                            .attr("class", i !== 2 ? "num" : null),
                    );

                    if (hardPcFilter > 0)
                        filtered = filtered.filter(
                            (d) => d.pc === hardPcFilter,
                        );
                    if (hardSourceFilter)
                        filtered = filtered.filter(
                            (d) => (d.sources || []).includes(hardSourceFilter),
                        );

                        filtered = filtered.filter((d) =>
                            d.name.toLowerCase().includes(filter.toLowerCase()),
                        );
                    const tbody = t.append("tbody");
                    const diffFn = (d) =>
                        d.difficulty != null
                            ? Math.round((DATA.stats.elo_center || 1500) + DATA.stats.mu + d.difficulty)
                            : Math.round(
                                  (DATA.stats.elo_center || 1500) +
                                      DATA.stats.mu +
                                      d.beta,
                              );
                    const maxDiff =
                        d3.max(filtered.slice(0, 50).map(diffFn)) || 2000;
                    const minDiff =
                        d3.min(filtered.slice(0, 50).map(diffFn)) || 1000;
                    filtered.slice(0, 50).forEach((d, i) => {
                        const diff = diffFn(d);
                        const eloW =
                            d.elo_hard != null
                                ? d.elo_hard
                                : Math.round(
                                      (DATA.stats.elo_center || 1500) +
                                          DATA.stats.mu +
                                          d.beta -

                        tr.append("td").attr("class", "num").text(d.pc);
                        const td = tr
                            .append("td")
                            .attr("class", "num bar-cell");
                        td.append("div")
                            .attr("class", "bar-bg")
                            .style(
                                "width",
                                ((diff - minDiff) / (maxDiff - minDiff)) * 80 + "%",
                            )
                            .style("background", "var(--red)");
                        td.append("span").text(diff);
                        tr.append("td").attr("class", "num").style("color", "var(--text-light)").text(sigma);
                        tr.append("td").attr("class", "num").text(eloW);
                        tr.append("td").attr("class", "num").text(d.n);
                    });
                }

                    .slice()
                    .sort(
                        (a, b) =>
                            (a.elo_easy ||
                                EC + DATA.stats.mu + a.beta + 3 * a.std) -
                            (b.elo_easy ||
                                EC + DATA.stats.mu + b.beta + 3 * b.std),
                    );

                    const thead = t.append("thead").append("tr");
                    [
