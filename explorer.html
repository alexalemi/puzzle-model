                // Convert mB to human-readable time string (shared utility)
                function mBtoTime(mB) {
                    const seconds = Math.pow(10, mB / 1000);
                    if (seconds < 60) return Math.round(seconds) + "s";
                    const m = Math.floor(seconds / 60);
                    const s = Math.round(seconds % 60);
                    if (m < 60) return m + "m " + (s < 10 ? "0" : "") + s + "s";
                    const h = Math.floor(m / 60);
                    const rm = m % 60;
                    return h + "h " + (rm < 10 ? "0" : "") + rm + "m";
                }

                // --- Prediction Calculator ---
                (function() {
                    const S = DATA.stats;
                    const mu = S.mu;
                    const sigma = S.sigma;
                    const nu = S.nu || 2.6;
                    const sigma_alpha = S.sigma_alpha || 200;
                    const sigma_beta = S.sigma_beta || 200;
                    const delta_0 = S.delta_0 || 0;
                    const sigma_delta = S.sigma_delta || 0;
                    const log_w = S.log_w || [];
                    const N_REF = S.N_REF || 500;
                    const YEAR_CENTER = S.year_center || 2024;

                    // Box-Muller normal sampling
                    function randn() {
                        let u, v;
                        do { u = Math.random(); } while (u === 0);
                        v = Math.random();
                        return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
                    }

                    // Marsaglia-Tsang gamma sampling
                    function sampleGamma(shape, scale) {
                        if (shape < 1) {
                            return sampleGamma(shape + 1, scale) * Math.pow(Math.random(), 1 / shape);
                        }
                        const d = shape - 1/3, c = 1 / Math.sqrt(9 * d);
                        while (true) {
                            let x, v;
                            do { x = randn(); v = 1 + c * x; } while (v <= 0);
                            v = v * v * v;
                            const u = Math.random();
                            if (u < 1 - 0.0331 * (x*x) * (x*x)) return d * v * scale;
                            if (Math.log(u) < 0.5 * x*x + d * (1 - v + Math.log(v))) return d * v * scale;
                        }
                    }

                    // Sample from Student-t(nu, 0, sigma)
                    function sampleStudentT(nu, sigma) {
                        const chi2 = sampleGamma(nu / 2, 2);
                        return randn() * sigma / Math.sqrt(chi2 / nu);
                    }

                    // Compute f(N) = 1000/ln(10) * log(sum w_k g_k(N) / sum w_k g_k(N_REF))
                    function computeBasis(pc) {
                        if (!log_w.length) return 0;
                        const N = pc;
                        const g = [Math.sqrt(N), N, N * Math.log(N), N * N];
                        const g_ref = [Math.sqrt(N_REF), N_REF, N_REF * Math.log(N_REF), N_REF * N_REF];
                        let time_N = 0, time_ref = 0;
                        for (let k = 0; k < 4; k++) {
                            const w_k = Math.exp(log_w[k]);
                            time_N += w_k * g[k];
                            time_ref += w_k * g_ref[k];
                        }
                        return 1000 / Math.LN10 * (Math.log(time_N) - Math.log(time_ref));
                    }

                    // Populate datalists
                    const puzzlerList = document.getElementById("pred-puzzler-list");
                    DATA.puzzlers.forEach(d => {
                        const opt = document.createElement("option");
                        opt.value = d.name;
                        puzzlerList.appendChild(opt);
                    });
                    // Top puzzles by observation count
                    const topPuzzles = DATA.puzzles.slice().sort((a,b) => b.n - a.n).slice(0, 2000);
                    const puzzleList = document.getElementById("pred-puzzle-list");
                    topPuzzles.forEach(d => {
                        const opt = document.createElement("option");
                        opt.value = d.name + (d.pc ? " (" + d.pc + " pc)" : "");
                        puzzleList.appendChild(opt);
                    });

                    // Lookup maps
                    const puzzlerMap = {};
                    DATA.puzzlers.forEach(d => { puzzlerMap[d.name] = d; });
                    const puzzleMap = {};
                    DATA.puzzles.forEach(d => {
                        puzzleMap[d.name] = d;
                        puzzleMap[d.name + " (" + d.pc + " pc)"] = d;
                        if (d.puzzle_id) puzzleMap[d.puzzle_id] = d;
                    });

                    // Gamma from model_2r for practice effect
                    const gamma_2r = DATA.model2r_detail && DATA.model2r_detail.scalar_params.gamma
                        ? DATA.model2r_detail.scalar_params.gamma.mean : 0;

                    function renderPrediction() {
                        const puzzlerInput = document.getElementById("pred-puzzler").value.trim();
                        const puzzleInput = document.getElementById("pred-puzzle").value.trim();
                        const year = parseFloat(document.getElementById("pred-year").value);
                        const solveNum = parseInt(document.getElementById("pred-solve-num").value) || 1;
                        document.getElementById("pred-year-val").textContent = year.toFixed(1);
                        document.getElementById("pred-solve-num-val").textContent = solveNum;
                        // Practice effect annotation
                        const practiceEffect = gamma_2r * Math.log(solveNum);
                        const practiceNote = document.getElementById("pred-practice-note");
                        if (solveNum > 1 && gamma_2r !== 0) {
                            const pctChange = 100 * (Math.pow(10, practiceEffect / 1000) - 1);
                            practiceNote.textContent = `Practice: ${practiceEffect.toFixed(1)} mB (${pctChange.toFixed(1)}% time)`;
                            practiceNote.style.display = "";
                        } else {
                            practiceNote.style.display = "none";
                        }

                        // Resolve puzzler
                        const puzzler = puzzlerMap[puzzlerInput];
                        let alpha_eff, alpha_std, vel, vel_std, puzzlerLabel;
                        if (puzzler) {
                            const dt = year - (S.ranking_year || 2026);
                            alpha_eff = puzzler.alpha_proj - puzzler.velocity * dt;
                            // std grows with extrapolation from ranking year
                            alpha_std = Math.sqrt(puzzler.std * puzzler.std + puzzler.velocity_std * puzzler.velocity_std * dt * dt);
                            vel = puzzler.velocity;
                            vel_std = puzzler.velocity_std;
                            puzzlerLabel = puzzler.name;
                        } else {
                            alpha_eff = 0;
                            alpha_std = sigma_alpha;
                            vel = -delta_0;
                            vel_std = sigma_delta;
                            puzzlerLabel = "Average Puzzler";
                        }

                        // Resolve puzzle
                        const puzzle = puzzleMap[puzzleInput];
                        let beta_val, beta_std_val, pc, puzzleLabel;
                        if (puzzle) {
                            beta_val = puzzle.beta;
                            beta_std_val = puzzle.std;
                            pc = puzzle.pc;
                            puzzleLabel = puzzle.name;
                        } else {
                            beta_val = 0;
                            beta_std_val = sigma_beta;
                            pc = parseInt(document.getElementById("pred-pieces").value) || 500;
                            puzzleLabel = "Average Puzzle (" + pc + " pcs)";
                            document.getElementById("pred-custom-pieces").style.display = "";
                        }
                        if (puzzle) {
                            document.getElementById("pred-custom-pieces").style.display = "none";
                        }

                        const fN = computeBasis(pc);
                        const practiceAdj = gamma_2r * Math.log(solveNum);
                        const pointEst = mu + alpha_eff + beta_val + fN + practiceAdj;

                        // MC sampling (10K)
                        const N_MC = 10000;
                        const samples = new Float64Array(N_MC);
                        for (let i = 0; i < N_MC; i++) {
                            const a = alpha_eff + alpha_std * randn();
                            const b = beta_val + beta_std_val * randn();
                            const noise = sampleStudentT(nu, sigma);
                            samples[i] = mu + a + b + fN + practiceAdj + noise;
                        }
                        samples.sort();

                        // Quantiles
                        const q = p => samples[Math.min(Math.floor(p * N_MC), N_MC - 1)];
                        const median = q(0.5);
                        const ci50 = [q(0.25), q(0.75)];
                        const ci80 = [q(0.10), q(0.90)];
                        const ci95 = [q(0.025), q(0.975)];

                        // Show results
                        document.getElementById("pred-results").style.display = "";
                        document.getElementById("pred-decomp-details").style.display = "";

                        // Summary cards
                        const summary = d3.select("#pred-summary");
                        summary.html("");

                            .curve(d3.curveMonotoneX);
                        svg.append("path").datum(pc.solve_numbers)
                            .attr("d", line)
                            .attr("fill", "none").attr("stroke", "#e377c2").attr("stroke-width", 2.5);

                        pc.solve_numbers.forEach((n, i) => {
                            if (i === 0) return;
                            svg.append("circle")
                                .attr("cx", x(n)).attr("cy", y(pc.mean_mB[i]))
                                .attr("r", 4).attr("fill", "#e377c2")
                                .on("mouseover", (event) => showTip(event,
                                    `<b>Solve #${n}</b><br>${pc.mean_mB[i].toFixed(1)} mB (${pc.mean_pct[i].toFixed(1)}%)`))
                                .on("mouseout", hideTip);
                        });

                        const ann = [
                            { n: 2, label: `2nd: ${pc.mean_pct[1].toFixed(1)}%` },
                            { n: 10, label: `10th: ${pc.mean_pct[9].toFixed(1)}%` },
                        ];
                        ann.forEach(a => {
                            const i = a.n - 1;
                            svg.append("text")
                                .attr("x", x(a.n) + 6).attr("y", y(pc.mean_mB[i]) - 8)
                                .style("font-size", "11px").style("fill", "#666")
                                .text(a.label);
                        });

                        svg.append("g").attr("class", "axis")
                            .attr("transform", `translate(0,${H - mg.bottom})`)
                            .call(d3.axisBottom(x).ticks(10).tickFormat(d => d))
                            .append("text").attr("x", (W - mg.right + mg.left) / 2).attr("y", 36)
                            .style("text-anchor", "middle").style("font-size", "12px").style("fill", "#6e6e6e")
                            .text("Solve Number");
                        svg.append("g").attr("class", "axis")
                            .attr("transform", `translate(${mg.left},0)`)
                            .call(d3.axisLeft(y).ticks(6))
                            .append("text").attr("transform", "rotate(-90)")
                            .attr("x", -H / 2).attr("y", -40)
                            .style("text-anchor", "middle").style("font-size", "12px").style("fill", "#6e6e6e")
                            .text("Δ mB (negative = faster)");

                        const yPct = d3.scaleLinear()
                            .domain([100 * (Math.pow(10, yMin / 1000) - 1), 100 * (Math.pow(10, Math.max(yMax, 5) / 1000) - 1)])
                            .range([H - mg.bottom, mg.top]);
                        svg.append("g").attr("class", "axis")
                            .attr("transform", `translate(${W - mg.right},0)`)
                            .call(d3.axisRight(yPct).ticks(6).tickFormat(d => d.toFixed(0) + "%"))
                            .append("text").attr("transform", "rotate(-90)")
                            .attr("x", -H / 2).attr("y", 50)
                            .style("text-anchor", "middle").style("font-size", "12px").style("fill", "#6e6e6e")
                            .text("% time change");

                        const lg = svg.append("g").attr("transform", `translate(${mg.left + 8}, ${mg.top + 4})`);
                        lg.append("rect").attr("width", 14).attr("height", 10).attr("fill", "#e377c2").attr("opacity", 0.4);
                        lg.append("text").attr("x", 18).attr("y", 9).style("font-size", "10px").text("80% credible interval");
                    })();

                    // Repeat statistics grid
                    (function () {
                        const rs = M2R.repeat_stats;
                        if (!rs) return;
                        const stats = [
                            { value: fmtInt(rs.n_total), label: "Total Observations" },
                            { value: fmtInt(rs.n_first_attempt), label: "First-Attempt" },
                            { value: fmtInt(rs.n_repeat), label: "Repeat Solves" },
                            { value: fmtInt(rs.n_puzzlers_with_repeats), label: "Puzzlers w/ Repeats" },
                            { value: rs.max_solve_number, label: "Max Solve Number" },
                            { value: rs.median_solve_number_repeats || "—", label: "Median (Repeats)" },
                        ];
                        document.getElementById("repeat-stat-grid").innerHTML = stats.map(s =>
                            `<div class="stat-card"><span class="value">${s.value}</span><span class="label">${s.label}</span></div>`
                        ).join("");
                    })();

                    // Basis fractions stacked area
                    (function () {
                        if (!M2R.basis_fractions) return;
                        renderBasisFractions("#chart-basis-fractions-2r", M2R.basis_fractions, "Process Contributions to Solving Time");
                    })();
                } else {
                    document.getElementById("section-model2r").style.display = "none";
                }

                // --- Shared: basis fractions stacked area chart ---
                function renderBasisFractions(selector, bf, title) {
                    const labels = [
                        { key: "sqrt_N", label: "\u221aN (edge scanning)", color: "#4a7fb5" },
                        { key: "N", label: "N (per-piece work)", color: "#55a868" },
                        { key: "N_log_N", label: "N\u00b7log(N) (search)", color: "#dd8452" },
                        { key: "N_sq", label: "N\u00b2 (combinatorial)", color: "#8172b2" },
                    ];
                    const pieces = bf.pieces;
                    const W = 600, H = 320;
                    const mg = { top: 32, right: 140, bottom: 44, left: 56 };
                    const svg = d3.select(selector).append("svg")
                        .attr("viewBox", `0 0 ${W} ${H}`).attr("width", "100%");
                    svg.append("text").attr("class", "chart-title")
                        .attr("x", (W - mg.right + mg.left) / 2).attr("y", 16)
                        .attr("text-anchor", "middle").text(title);

                    const x = d3.scaleLog()
                        .domain([d3.min(pieces) * 0.9, d3.max(pieces) * 1.1])
                        .range([mg.left, W - mg.right]);
                    const y = d3.scaleLinear()
                        .domain([0, 1])
                        .range([H - mg.bottom, mg.top]);

                    // Build stacked data: cumulative fractions
                    const n = pieces.length;
                    const cumBottom = new Array(n).fill(0);

                    labels.forEach((l, li) => {
                        const vals = bf[l.key].mean;
                        const tops = vals.map((v, i) => cumBottom[i] + v);

                        // Stacked area band
                        const area = d3.area()
                            .x((d, i) => x(pieces[i]))
                            .y0((d, i) => y(cumBottom[i]))
                            .y1((d, i) => y(tops[i]))
                            .curve(d3.curveMonotoneX);
                        svg.append("path").datum(vals)
                            .attr("d", area)
                            .attr("fill", l.color).attr("opacity", 0.7)
                            .attr("stroke", l.color).attr("stroke-width", 0.5);

                        // Label line at midpoint of band
                        const midY = vals.map((v, i) => (cumBottom[i] + tops[i]) / 2);

                        // Update cumulative
                        tops.forEach((v, i) => { cumBottom[i] = v; });
                    });

                    // N_REF marker
                    const nRef = 500;
                    svg.append("line")
                        .attr("x1", x(nRef)).attr("x2", x(nRef))
                        .attr("y1", mg.top).attr("y2", H - mg.bottom)
                        .attr("stroke", "#fff").attr("stroke-width", 1)
                        .attr("stroke-dasharray", "3,3").attr("opacity", 0.6);
                    svg.append("text")
                        .attr("x", x(nRef) + 4).attr("y", mg.top + 12)
                        .style("font-size", "9px").style("fill", "#999")
                        .text("N=500");

                    // Axes
                    svg.append("g").attr("class", "axis")
                        .attr("transform", `translate(0,${H - mg.bottom})`)
                        .call(d3.axisBottom(x).ticks(6))
                        .append("text").attr("x", W / 2).attr("y", 36)
                        .style("text-anchor", "middle").style("font-size", "12px").style("fill", "#6e6e6e")
                        .text("Piece count (N)");
                    svg.append("g").attr("class", "axis")
                        .attr("transform", `translate(${mg.left},0)`)
                        .call(d3.axisLeft(y).ticks(5).tickFormat(d => (d * 100).toFixed(0) + "%"))
                        .append("text").attr("transform", "rotate(-90)")
                        .attr("x", -H / 2).attr("y", -40)
                        .style("text-anchor", "middle").style("font-size", "12px").style("fill", "#6e6e6e")
                        .text("Fraction of solving time");

                    // Legend
                    const lg = svg.append("g")
                        .attr("transform", `translate(${W - mg.right + 8}, ${mg.top + 8})`);
                    labels.forEach((l, i) => {
                        const g = lg.append("g").attr("transform", `translate(0, ${i * 18})`);
                        g.append("rect").attr("width", 14).attr("height", 12)
                            .attr("fill", l.color).attr("opacity", 0.7);
                        g.append("text").attr("x", 18).attr("y", 10)
                            .style("font-size", "10px").text(l.label);
                    });

                    // Tooltip: show percentages at each piece count
                    const overlay = svg.append("rect")
                        .attr("x", mg.left).attr("y", mg.top)
                        .attr("width", W - mg.left - mg.right)
                        .attr("height", H - mg.top - mg.bottom)
                        .attr("fill", "transparent");

                    const tipLine = svg.append("line")
                        .attr("y1", mg.top).attr("y2", H - mg.bottom)
                        .attr("stroke", "#666").attr("stroke-width", 1)
                        .attr("stroke-dasharray", "2,2").style("display", "none");

                    overlay.on("mousemove", function(event) {
                        const [mx] = d3.pointer(event);
                        const nVal = x.invert(mx);
                        // Find nearest piece count
                        let closest = 0;
                        let minDist = Infinity;
                        pieces.forEach((p, i) => {
                            const d = Math.abs(Math.log(p) - Math.log(nVal));
                            if (d < minDist) { minDist = d; closest = i; }
                        });
                        tipLine.attr("x1", x(pieces[closest])).attr("x2", x(pieces[closest]))
                            .style("display", null);
                        const pcts = labels.map(l => `<b style="color:${l.color}">${l.label}</b>: ${(bf[l.key].mean[closest] * 100).toFixed(1)}%`);
                        showTip(event, `<b>N = ${pieces[closest]}</b><br>` + pcts.join("<br>"));
                    }).on("mouseout", function() {
                        tipLine.style("display", "none");
                        hideTip();
                    });
                }

                // --- Wire up interactivity ---
                function updateAll() {
                    renderSelector(
                        "model-selector",
                        MODEL_NAMES,
                        activeModels,
                        (key) => {
                            if (activeModels.has(key)) activeModels.delete(key);
                            else activeModels.add(key);
                            updateAll();
                        },
                        true,
                    );
                    renderMetricsChart();
                    renderLossChart();
                }

                function onResidualSelect(key) {
                    activeResModel = key;
                    renderSelector(
                        "residual-selector",
                        MODEL_NAMES,
                        activeResModel,
                        onResidualSelect,
                        false,
                    );
                    renderResiduals();
                }
                renderSelector(
                    "residual-selector",
                    MODEL_NAMES,
                    activeResModel,
                    onResidualSelect,
                    false,
                );

                document
                    .getElementById("puzzler-search")
                    .addEventListener("input", function () {
                        renderPuzzlerTable(this.value);
                    });
                document
                    .getElementById("puzzle-search")
                    .addEventListener("input", function () {
                        renderPuzzleTable(this.value);
                    });
                document
                    .getElementById("puzzle-pc-filter")
                    .addEventListener("change", function () {
                        hardPcFilter = parseInt(this.value);
                        renderPuzzleTable(
                            document.getElementById("puzzle-search").value,
                        );
                    });
                document
                    .getElementById("easy-puzzle-search")
                    .addEventListener("input", function () {
                        renderEasyPuzzleTable(this.value);
                    });
                document
                    .getElementById("easy-puzzle-pc-filter")
                    .addEventListener("change", function () {
                        easyPcFilter = parseInt(this.value);
                        renderEasyPuzzleTable(
                            document.getElementById("easy-puzzle-search").value,
                        );
                    });
                document
                    .getElementById("puzzle-source-filter")
                    .addEventListener("change", function () {
                        hardSourceFilter = this.value;
                        renderPuzzleTable(
                            document.getElementById("puzzle-search").value,
                        );
                    });
                document
                    .getElementById("easy-puzzle-source-filter")
                    .addEventListener("change", function () {
                        easySourceFilter = this.value;
                        renderEasyPuzzleTable(
                            document.getElementById("easy-puzzle-search").value,
                        );
                    });

                // --- Individual Puzzler Deep Dive ---
                (function() {
                    let OBS_DATA = null;
                    const ddDetails = document.getElementById("puzzler-deep-dive");
                    const ddLoading = document.getElementById("deep-dive-loading");
                    const ddContent = document.getElementById("deep-dive-content");
                    const ddSearch = document.getElementById("deep-dive-search");

                    ddDetails.addEventListener("toggle", function() {
                        if (ddDetails.open && !OBS_DATA) {
                            ddLoading.style.display = "";
                            fetch("explorer_puzzler_obs.json")
                                .then(r => r.json())
                                .then(data => {
                                    OBS_DATA = data;
                                    ddLoading.style.display = "none";
                                    if (ddSearch.value.trim()) renderDeepDive(ddSearch.value.trim());
                                })
                                .catch(err => {
                                    ddLoading.textContent = "Failed to load explorer_puzzler_obs.json: " + err.message;
                                });
                        }
                    });

                    ddSearch.addEventListener("change", function() {
                        if (OBS_DATA && this.value.trim()) renderDeepDive(this.value.trim());
                    });

                    const sourceColors = { s: "var(--blue)", m: "var(--green)", a: "var(--purple)", u: "var(--orange)" };
                    const sourceNames = { s: "SP", m: "MSP", a: "Mallory", u: "USAJ" };

                    function renderDeepDive(name) {
                        if (!OBS_DATA || !OBS_DATA[name]) {
                            ddContent.style.display = "none";
                            return;
                        }
                        ddContent.style.display = "";
                        const cols = OBS_DATA._columns;
                        const raw = OBS_DATA[name];
                        const obs = raw.map(r => {
                            const o = {};
                            cols.forEach((c, i) => o[c] = r[i]);
                            return o;
                        });

                        // Stat cards
                        const meanPct = d3.mean(obs, d => d.percentile);
                        const tailRate = d3.mean(obs, d => d.percentile < 0.1 || d.percentile > 0.9 ? 1 : 0);
                        const statsEl = d3.select("#deep-dive-stats");
                        statsEl.html("");
                        [
                            { label: "Solves", value: obs.length },
                            { label: "Mean Percentile", value: meanPct.toFixed(2) },
                            { label: "Surprise Rate", value: (tailRate * 100).toFixed(0) + "%" },
                        ].forEach(c => {
                            const card = statsEl.append("div").attr("class", "stat-card");
                            card.append("span").attr("class", "value").text(c.value);
                            card.append("span").attr("class", "label").text(c.label);
                        });

                        // Percentile histogram
                        const histEl = d3.select("#chart-dd-histogram");
                        histEl.html("");
                        const W = 300, H = 200;
                        const mg = { top: 28, right: 12, bottom: 36, left: 40 };
                        const bins = d3.range(10).map(i => ({
                            x0: i * 0.1, x1: (i + 1) * 0.1,
                            count: obs.filter(d => d.percentile >= i * 0.1 && d.percentile < (i + 1) * 0.1 + (i === 9 ? 0.01 : 0)).length,
                        }));
                        const expected = obs.length / 10;
                        const x = d3.scaleLinear().domain([0, 1]).range([mg.left, W - mg.right]);
                        const yMax = d3.max(bins, d => d.count);
                        const y = d3.scaleLinear().domain([0, Math.max(yMax, expected) * 1.15]).range([H - mg.bottom, mg.top]);
                        const svg = histEl.append("svg").attr("viewBox", `0 0 ${W} ${H}`).attr("width", "100%");
                        svg.append("text").attr("class", "chart-title").attr("x", W / 2).attr("y", 16)
                            .attr("text-anchor", "middle").text("Percentile Distribution");
                        // Expected line
                        svg.append("line")
                            .attr("x1", mg.left).attr("x2", W - mg.right)
                            .attr("y1", y(expected)).attr("y2", y(expected))
                            .attr("stroke", "var(--red)").attr("stroke-dasharray", "4,3").attr("stroke-width", 1);
                        // Bars
                        const barW = (W - mg.left - mg.right) / 10;
                        svg.selectAll(".hist-bar").data(bins).enter().append("rect")
                            .attr("x", d => x(d.x0) + 1).attr("y", d => y(d.count))
                            .attr("width", barW - 2).attr("height", d => y(0) - y(d.count))
                            .attr("fill", "var(--blue)").attr("opacity", 0.6);
                        svg.append("g").attr("class", "axis")
                            .attr("transform", `translate(0,${H - mg.bottom})`)
                            .call(d3.axisBottom(x).ticks(5).tickFormat(d3.format(".1f")));
                        svg.append("g").attr("class", "axis")
                            .attr("transform", `translate(${mg.left},0)`)
                            .call(d3.axisLeft(y).ticks(4));

                        // Residual timeline (using dates)
                        const tlEl = d3.select("#chart-dd-timeline");
                        tlEl.html("");
                        const W2 = 300, H2 = 200;
                        const parseDate = s => {
                            if (!s) return null;
                            if (s.length > 4) return new Date(s);
                            return new Date(+s, 6, 1);  // year-only: mid-year
                        };
                        const obsDates = obs.map(d => ({ ...d, _date: parseDate(d.date) })).filter(d => d._date);
                        const dateExtent = d3.extent(obsDates, d => d._date);
                        const datePad = Math.max((dateExtent[1] - dateExtent[0]) * 0.05, 7 * 86400000);
                        const xT = d3.scaleTime()
                            .domain([new Date(dateExtent[0] - datePad), new Date(+dateExtent[1] + datePad)])
                            .range([mg.left, W2 - mg.right]);
                        const yT = d3.scaleLinear().domain([0, 1]).range([H2 - mg.bottom, mg.top]);
                        const svg2 = tlEl.append("svg").attr("viewBox", `0 0 ${W2} ${H2}`).attr("width", "100%");
                        svg2.append("text").attr("class", "chart-title").attr("x", W2 / 2).attr("y", 16)
                            .attr("text-anchor", "middle").text("Percentile Over Time");
                        svg2.append("line")
                            .attr("x1", mg.left).attr("x2", W2 - mg.right)
                            .attr("y1", yT(0.5)).attr("y2", yT(0.5))
                            .attr("stroke", "var(--border)").attr("stroke-width", 1);
                        svg2.selectAll(".dot").data(obsDates).enter().append("circle")
                            .attr("cx", d => xT(d._date)).attr("cy", d => yT(d.percentile))
                            .attr("r", 3).attr("fill", d => sourceColors[d.source] || "var(--text-light)")
                            .attr("opacity", 0.7);
                        svg2.append("g").attr("class", "axis")
                            .attr("transform", `translate(0,${H2 - mg.bottom})`)
                            .call(d3.axisBottom(xT).ticks(4));
                        svg2.append("g").attr("class", "axis")
                            .attr("transform", `translate(${mg.left},0)`)
                            .call(d3.axisLeft(yT).ticks(5));
                        // Source legend
                        const sources = [...new Set(obs.map(d => d.source))];
                        const lg = svg2.append("g").attr("transform", `translate(${W2 - mg.right - 50}, ${mg.top + 4})`);
                        sources.forEach((s, i) => {
                            lg.append("circle").attr("cx", 0).attr("cy", i * 14).attr("r", 3)
                                .attr("fill", sourceColors[s] || "gray");
                            lg.append("text").attr("x", 6).attr("y", i * 14 + 4)
                                .style("font-size", "10px").text(sourceNames[s] || s);
                        });

                        // Observation table
                        const imgLookup = OBS_DATA._images || {};
                        const table = d3.select("#deep-dive-table");
                        table.html("");
                        const thead = table.append("thead").append("tr");
                        const colDefs = [
                            { key: "_img", label: "", fmt: () => "" },
                            { key: "puzzle_id", label: "Puzzle", fmt: d => d.replace(/_\d+$/, "") },
                            { key: "pieces", label: "Pieces", fmt: d => d, cls: "num" },
                            { key: "log_time", label: "Time", fmt: d => mBtoTime(d), cls: "num" },
                            { key: "pred_mean", label: "Predicted", fmt: d => mBtoTime(d), cls: "num" },
                            { key: "_residual", label: "Resid (mB)", fmt: d => d, cls: "num" },
                            { key: "percentile", label: "Percentile", fmt: d => d.toFixed(2), cls: "num" },
                            { key: "date", label: "Date", fmt: d => d || "—" },
                            { key: "source", label: "Src", fmt: d => sourceNames[d] || d },
                            { key: "solve_number", label: "Solve#", fmt: d => d, cls: "num" },
                        ];
                        let sortKey = "percentile", sortAsc = true;
                        function renderTable() {
                            const sorted = obs.slice().map(d => ({
                                ...d, _residual: d.log_time - d.pred_mean,
                            })).sort((a, b) => {
                                const va = a[sortKey], vb = b[sortKey];
                                return sortAsc ? (va < vb ? -1 : va > vb ? 1 : 0) : (va > vb ? -1 : va < vb ? 1 : 0);
                            });
                            table.html("");
                            const th = table.append("thead").append("tr");
                            colDefs.forEach(c => {
                                th.append("th").text(c.label + (sortKey === c.key ? (sortAsc ? " ▲" : " ▼") : ""))
                                    .style("cursor", c.key === "_img" ? "default" : "pointer")
                                    .on("click", c.key === "_img" ? null : () => {
                                        if (sortKey === c.key) sortAsc = !sortAsc;
                                        else { sortKey = c.key; sortAsc = true; }
                                        renderTable();
                                    });
                            });
                            const tbody = table.append("tbody");
                            sorted.forEach(d => {
                                const tr = tbody.append("tr");
                                colDefs.forEach(c => {
                                    if (c.key === "_img") {
                                        const td = tr.append("td").style("width", "48px").style("padding", "2px 4px");
                                        const src = imgLookup[d.puzzle_id];
                                        if (src) td.append("img").attr("src", src).attr("class", "puzzle-thumb");
                                        return;
                                    }
                                    const val = d[c.key];
                                    const td = tr.append("td").text(c.fmt(val));
                                    if (c.cls) td.attr("class", c.cls);
                                    if (c.key === "percentile") {
                                        const bg = val < 0.3 ? "rgba(85,168,104,0.15)" :
                                                   val > 0.7 ? "rgba(196,78,82,0.15)" : "";
                                        if (bg) td.style("background", bg);
                                    }
                                    if (c.key === "_residual") td.text(Math.round(val));
                                });
                            });
                        }
                        renderTable();
                    }
                })();

                updateAll();
                renderResiduals();
                renderMetricsTable();
                renderPuzzlerTable();
                renderPuzzleTable();
                renderEasyPuzzleTable();
            }
        </script>
    </body>
</html>
